## Global parameters
## Global Docker image parameters
## Please, note that this will override the image parameters, including dependencies, configured to use the global value
## Current available global Docker image parameters: imageRegistry, imagePullSecrets and storageClass

##
global:
  # -- Global Docker image registry
  imageRegistry: ""
  ## E.g.
  ## imagePullSecrets:
  ##   - myRegistryKeySecretName
  ##
  # -- Global Docker registry secret names as an array
  imagePullSecrets: []
  # -- Global default StorageClass for Persistent Volume(s)
  defaultStorageClass: ""
  # -- DEPRECATED: use global.defaultStorageClass instead
  storageClass: ""
  ## Security parameters
  ##
  security:
    # -- Allows skipping image verification
    allowInsecureImages: false
  elasticsearch:
    service:
      # -- Elasticsearch service name to be used in the Kibana subchart (ignored if kibanaEnabled=false)
      name: elasticsearch
      ports:
        # -- Elasticsearch service restAPI port to be used in the Kibana subchart (ignored if kibanaEnabled=false)
        restAPI: 9200
  # -- Whether or not to enable Kibana
  kibanaEnabled: false
  ## Compatibility adaptations for Kubernetes platforms
  ##
  compatibility:
    ## Compatibility adaptations for Openshift
    ##
    openshift:
      ##
      # -- Adapt the securityContext sections of the deployment to make them compatible with Openshift restricted-v2 SCC: remove runAsUser, runAsGroup and fsGroup and let the platform use their allowed default IDs. Possible values: auto (apply if the detected running cluster is Openshift), force (perform the adaptation always), disabled (do not perform adaptation)
      adaptSecurityContext: auto
## Common parameters

##
# -- Override Kubernetes version
kubeVersion: ""
##
# -- String to partially override common.names.fullname
nameOverride: ""
##
# -- String to fully override common.names.fullname
fullnameOverride: ""
##
# -- Labels to add to all deployed objects
commonLabels: {}
##
# -- Annotations to add to all deployed objects
commonAnnotations: {}
##
# -- Kubernetes cluster domain name
clusterDomain: cluster.local
##
# -- Array of extra objects to deploy with the release
extraDeploy: []
##
# -- String to fully override common.names.namespace
namespaceOverride: ""
##
# -- Mount credentials as files instead of using environment variables
usePasswordFiles: true
## Enable diagnostic mode in the deployment
##
diagnosticMode:
  ##
  # -- Enable diagnostic mode (all probes will be disabled and the command will be overridden)
  enabled: false
  ##
  # -- Command to override all containers in the deployment
  command:
    - sleep
  ##
  # -- Args to override all containers in the deployment
  args:
    - infinity
## Elasticsearch cluster Parameters

##
# -- Elasticsearch cluster name
clusterName: elastic
##
containerPorts:
  # -- Elasticsearch REST API port
  restAPI: 9200
  # -- Elasticsearch Transport port
  transport: 9300
## ref: https://github.com/bitnami/containers/tree/main/bitnami/elasticsearch#environment-variables
##
# -- Comma, semi-colon or space separated list of plugins to install at initialization
plugins: ""
## ref: https://github.com/bitnami/containers/tree/main/bitnami/elasticsearch#environment-variables
##
# -- File System snapshot repository path
snapshotRepoPath: ""
##
# -- Override elasticsearch configuration
config: {}
## Use this instead of `config` to add more configuration
## See below example:
## extraConfig:
##   node:
##     store:
##       allow_mmap: false
## ref: https://www.elastic.co/guide/en/elasticsearch/reference/current/settings.html
##
# -- Append extra configuration to the elasticsearch node configuration
extraConfig: {}
## Example Use Case: When you have a cluster with nodes spaned acorss multiple K8s or namespaces
## extraHosts:
##   - datacenter2-elasticsearch-master-hl.namespace2.svc
##   - datacenter2-elasticsearch-data-hl.namespace2.svc
# -- A list of external hosts which are part of this cluster
extraHosts: []
## Example Use Case: mount ssl certificates when elasticsearch has tls enabled
## extraVolumes:
##   - name: es-certs
##     secret:
##       defaultMode: 420
##       secretName: es-certs
# -- A list of volumes to be added to the pod
extraVolumes: []
## extraVolumeMounts:
##   - name: es-certs
##     mountPath: /certs
##     readOnly: true
# -- A list of volume mounts to be added to the pod
extraVolumeMounts: []
## Specify dictionary of scripts to be run at first boot
## Alternatively, you can put your scripts under the files/docker-entrypoint-initdb.d directory
## For example:
## initScripts:
##   my_init_script.sh: |
##      #!/bin/sh
##      echo "Do something."
##
# -- Dictionary of init scripts. Evaluated as a template.
initScripts: {}
## Note: This will override initScripts
##
# -- ConfigMap with the init scripts. Evaluated as a template.
initScriptsCM: ""
##
# -- Secret containing `/docker-entrypoint-initdb.d` scripts to be executed at initialization time that contain sensitive data. Evaluated as a template.
initScriptsSecret: ""
## For example:
## extraEnvVars:
##  - name: MY_ENV_VAR
##    value: env_var_value
##
# -- Array containing extra env vars to be added to all pods (evaluated as a template)
extraEnvVars: []
##
# -- ConfigMap containing extra env vars to be added to all pods (evaluated as a template)
extraEnvVarsCM: ""
##
# -- Secret containing extra env vars to be added to all pods (evaluated as a template)
extraEnvVarsSecret: ""
## e.g:
## sidecars:
##   - name: your-image-name
##     image: your-image
##     imagePullPolicy: Always
##     ports:
##       - name: portname
##         containerPort: 1234
##
# -- Add additional sidecar containers to the all elasticsearch node pod(s)
sidecars: []
## ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
## e.g:
## initContainers:
##  - name: your-image-name
##    image: your-image
##    imagePullPolicy: Always
##    command: ['sh', '-c', 'echo "hello world"']
##
# -- Add additional init containers to the all elasticsearch node pod(s)
initContainers: []
##
# -- enables (or disables if false) the default init containers (sysctl, volume permissions, copy plugins etc...)
enableDefaultInitContainers: true
##
# -- Use this variable to add Istio labels to all pods
useIstioLabels: true
## Bitnami Elasticsearch image
##
image:
  # -- Elasticsearch image registry
  registry: docker.io
  # -- Elasticsearch image repository
  repository: bitnamilegacy/elasticsearch
  # @ignored
  tag: 8.18.0-debian-12-r2
  # -- Elasticsearch image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
  digest: ""
  ## Specify a imagePullPolicy
  ## ref: http://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
  ##
  # -- Elasticsearch image pull policy
  pullPolicy: IfNotPresent
  ## Optionally specify an array of imagePullSecrets.
  ## Secrets must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ## e.g:
  ## pullSecrets:
  ##   - myRegistryKeySecretName
  ##
  # -- Elasticsearch image pull secrets
  pullSecrets: []
  ## Enable debug mode
  ##
  # -- Enable Elasticsearch image debug mode
  debug: false
## X-Pack security parameters
## Note: TLS configuration is required in order to configure password authentication
##
security:
  ##
  # -- Enable X-Pack Security settings
  enabled: false
  ## Ref: https://github.com/bitnami/containers/tree/main/bitnami/elasticsearch#security
  ##
  # -- Password for 'elastic' user
  elasticPassword: ""
  ##
  # -- Name of the existing secret containing the Elasticsearch password (expected key: `elasticsearch-password`)
  existingSecret: ""
  ## FIPS mode
  ## Ref: https://www.elastic.co/guide/en/elasticsearch/reference/current/fips-140-compliance.html
  ##
  # -- Configure elasticsearch with FIPS 140 compliant mode
  fipsMode: false
  ## TLS configuration
  ##
  tls:
    ##
    # -- Enable SSL/TLS encryption for Elasticsearch REST API.
    restEncryption: true
    ## NOTE: If autoGenerated certs are enabled and a new node type is enabled using helm upgrade, make sure you remove previously existing Elasticsearch TLS secrets.
    ## Otherwise, the new node certs won't match the existing certs.
    ##
    # -- Create self-signed TLS certificates.
    autoGenerated: false
    ## Supported values: full, certificate, none.
    ## Ref: https://www.elastic.co/guide/en/elasticsearch/reference/current/security-settings.html
    ##
    # -- Verification mode for SSL communications.
    verificationMode: "full"
    ##
    master:
      # -- Existing secret containing the certificates for the master nodes
      existingSecret: ""
    data:
      # -- Existing secret containing the certificates for the data nodes
      existingSecret: ""
    ingest:
      # -- Existing secret containing the certificates for the ingest nodes
      existingSecret: ""
    coordinating:
      # -- Existing secret containing the certificates for the coordinating nodes
      existingSecret: ""
    ##
    # -- Name of the keystore file
    keystoreFilename: elasticsearch.keystore.jks
    ##
    # -- Name of the truststore
    truststoreFilename: elasticsearch.truststore.jks
    ## Ignored when using autoGenerated certs.
    ##
    # -- Use this variable if your secrets contain PEM certificates instead of JKS/PKCS12
    usePemCerts: false
    ##
    # -- Existing secret containing the Keystore and Truststore passwords, or key password if PEM certs are used
    passwordsSecret: ""
    ## Ignored if security.tls.passwordsSecret is provided.
    ##
    # -- Password to access the JKS/PKCS12 keystore or PEM key when they are password-protected.
    keystorePassword: ""
    ## Ignored if security.tls.passwordsSecret is provided.
    ##
    # -- Password to access the JKS/PKCS12 truststore when they are password-protected.
    truststorePassword: ""
    ## Ignored if security.tls.passwordsSecret is provided.
    ##
    # -- Password to access the PEM key when they are password-protected.
    keyPassword: ""
    ##
    # -- Name of the secret key containing the Keystore password
    secretKeystoreKey: ""
    ##
    # -- Name of the secret key containing the Truststore password
    secretTruststoreKey: ""
    ##
    # -- Name of the secret key containing the PEM key password
    secretKey: ""
## Traffic Exposure Parameters
##

## Elasticsearch service parameters
##
service:
  ##
  # -- Elasticsearch service type
  type: ClusterIP
  ##
  ports:
    # -- Elasticsearch service REST API port
    restAPI: 9200
    # -- Elasticsearch service transport port
    transport: 9300
  ## Node ports to expose
  ## NOTE: choose port between <30000-32767>
  ##
  nodePorts:
    # -- Node port for REST API
    restAPI: ""
    # -- Node port for REST API
    transport: ""
  ## e.g.:
  ## clusterIP: None
  ##
  # -- Elasticsearch service Cluster IP
  clusterIP: ""
  ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-loadbalancer
  ##
  # -- Elasticsearch service Load Balancer IP
  loadBalancerIP: ""
  ## ref: https://kubernetes.io/docs/tasks/access-application-cluster/configure-cloud-provider-firewall/#restrict-access-for-loadbalancer-service
  ## e.g:
  ## loadBalancerSourceRanges:
  ##   - 10.10.10.0/24
  ##
  # -- Elasticsearch service Load Balancer sources
  loadBalancerSourceRanges: []
  ## ref http://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/#preserving-the-client-source-ip
  ##
  # -- Elasticsearch service external traffic policy
  externalTrafficPolicy: Cluster
  ##
  # -- Additional custom annotations for Elasticsearch service
  annotations: {}
  ##
  # -- Extra ports to expose in Elasticsearch service (normally used with the `sidecars` value)
  extraPorts: []
  ## If "ClientIP", consecutive client requests will be directed to the same Pod
  ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#virtual-ips-and-service-proxies
  ##
  # -- Session Affinity for Kubernetes service, can be "None" or "ClientIP"
  sessionAffinity: None
  ## sessionAffinityConfig:
  ##   clientIP:
  ##     timeoutSeconds: 300
  ##
  # -- Additional settings for the sessionAffinity
  sessionAffinityConfig: {}
## Elasticsearch ingress parameters
## ref: http://kubernetes.io/docs/concepts/services-networking/ingress/
##
ingress:
  ##
  # -- Enable ingress record generation for Elasticsearch
  enabled: false
  ##
  # -- Ingress path type
  pathType: ImplementationSpecific
  ##
  # -- Force Ingress API version (automatically detected if not set)
  apiVersion: ""
  ##
  # -- Default host for the ingress record
  hostname: elasticsearch.local
  ## NOTE: You may need to set this to '/*' in order to use this with ALB ingress controllers
  ##
  # -- Default path for the ingress record
  path: /
  ## Use this parameter to set the required annotations for cert-manager, see
  ## ref: https://cert-manager.io/docs/usage/ingress/#supported-annotations
  ## e.g:
  ## annotations:
  ##   kubernetes.io/ingress.class: nginx
  ##   cert-manager.io/cluster-issuer: cluster-issuer-name
  ##
  # -- Additional annotations for the Ingress resource. To enable certificate autogeneration, place here your cert-manager annotations.
  annotations: {}
  ## TLS certificates will be retrieved from a TLS secret with name: `{{- printf "%s-tls" .Values.ingress.hostname }}`
  ## You can:
  ##   - Use the `ingress.secrets` parameter to create this TLS secret
  ##   - Rely on cert-manager to create it by setting the corresponding annotations
  ##   - Rely on Helm to create self-signed certificates by setting `ingress.selfSigned=true`
  ##
  # -- Enable TLS configuration for the host defined at `ingress.hostname` parameter
  tls: false
  ##
  # -- Create a TLS secret for this ingress record using self-signed certificates generated by Helm
  selfSigned: false
  ## This is supported in Kubernetes 1.18+ and required if you have more than one IngressClass marked as the default for your cluster .
  ## ref: https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/
  ##
  # -- IngressClass that will be be used to implement the Ingress (Kubernetes 1.18+)
  ingressClassName: ""
  ## e.g:
  ## extraHosts:
  ##   - name: elasticsearch.local
  ##     path: /
  ##
  # -- An array with additional hostname(s) to be covered with the ingress record
  extraHosts: []
  ## e.g:
  ## extraPaths:
  ## - path: /*
  ##   backend:
  ##     serviceName: ssl-redirect
  ##     servicePort: use-annotation
  ##
  # -- An array with additional arbitrary paths that may need to be added to the ingress under the main host
  extraPaths: []
  ## ref: https://kubernetes.io/docs/concepts/services-networking/ingress/#tls
  ## e.g:
  ## extraTls:
  ## - hosts:
  ##     - elasticsearch.local
  ##   secretName: elasticsearch.local-tls
  ##
  # -- TLS configuration for additional hostname(s) to be covered with this ingress record
  extraTls: []
  ## NOTE: 'key' and 'certificate' are expected in PEM format
  ## NOTE: 'name' should line up with a 'secretName' set further up
  ## If it is not set and you're using cert-manager, this is unneeded, as it will create a secret for you with valid certificates
  ## If it is not set and you're NOT using cert-manager either, self-signed certificates will be created valid for 365 days
  ## It is also possible to create and manage the certificates outside of this helm chart
  ## Please see README.md for more information
  ## e.g:
  ## secrets:
  ##   - name: elasticsearch.local-tls
  ##     key: |-
  ##       -----BEGIN RSA PRIVATE KEY-----
  ##       ...
  ##       -----END RSA PRIVATE KEY-----
  ##     certificate: |-
  ##       -----BEGIN CERTIFICATE-----
  ##       ...
  ##       -----END CERTIFICATE-----
  ##
  # -- Custom TLS certificates as secrets
  secrets: []
  ## ref: https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-rules
  ## e.g:
  ## extraRules:
  ## - host: example.local
  ##     http:
  ##       path: /
  ##       backend:
  ##         service:
  ##           name: example-svc
  ##           port:
  ##             name: http
  ##
  # -- Additional rules to be covered with this ingress record
  extraRules: []
## Master-elegible nodes parameters
master:
  ## If you are
  # -- Deploy the Elasticsearch master-elegible nodes as master-only nodes. Recommended for high-demand deployments.
  masterOnly: true
  ##
  # -- Number of master-elegible replicas to deploy
  replicaCount: 2
  ##
  # -- Append extra roles to the node role
  extraRoles: []
  ## Pod Disruption Budget configuration
  ## ref: https://kubernetes.io/docs/tasks/run-application/configure-pdb
  ##
  pdb:
    # -- Enable/disable a Pod Disruption Budget creation
    create: true
    # -- Minimum number/percentage of pods that should remain scheduled
    minAvailable: ""
    # -- Maximum number/percentage of pods that may be made unavailable
    maxUnavailable: ""
  ##
  # -- String to partially override elasticsearch.master.fullname
  nameOverride: ""
  ##
  # -- String to fully override elasticsearch.master.fullname
  fullnameOverride: ""
  ##
  # -- String to fully override elasticsearch.master.servicename
  servicenameOverride: ""
  ##
  # -- Annotations for the master statefulset
  annotations: {}
  ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies
  ##
  updateStrategy:
    # -- Master-elegible nodes statefulset stategy type
    type: RollingUpdate
  ## Elasticsearch resource requests and limits
  ## ref: http://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/
  ## We usually recommend not to specify default resources and to leave this as a conscious
  ## choice for the user. This also increases chances charts run on environments with little
  ## resources, such as Minikube. If you do want to specify resources, uncomment the following
  ## lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  ## More information: https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
  ##
  # -- Set container resources according to one common preset (allowed values: none, nano, micro, small, medium, large, xlarge, 2xlarge). This is ignored if master.resources is set (master.resources is recommended for production).
  resourcesPreset: "small"
  ## Example:
  ## resources:
  ##   requests:
  ##     cpu: 2
  ##     memory: 512Mi
  ##   limits:
  ##     cpu: 3
  ##     memory: 1024Mi
  ##
  # -- Set container requests and limits for different resources like CPU or memory (essential for production workloads)
  resources: {}
  ## Note: The recommended heapSize is half of the container's memory.
  ## If omitted, it will be automatically set.
  ## Example:
  ##   heapSize: 128m
  ##
  # -- Elasticsearch master-eligible node heap size.
  heapSize: 128m
  ## Configure Pods Security Context
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
  ##
  podSecurityContext:
    # -- Enabled master-elegible pods' Security Context
    enabled: true
    # -- Set filesystem group change policy
    fsGroupChangePolicy: Always
    # -- Set kernel settings using the sysctl interface
    sysctls: []
    # -- Set filesystem extra groups
    supplementalGroups: []
    # -- Set master-elegible pod's Security Context fsGroup
    fsGroup: 1001
  ## Configure Container Security Context
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
  ##
  containerSecurityContext:
    # -- Elasticseacrh master-eligible container securityContext
    enabled: true
    # -- Set SELinux options in container
    seLinuxOptions: {}
    # -- User ID for the Elasticseacrh master-eligible container
    runAsUser: 1001
    # -- Group ID for the Elasticseacrh master-eligible container
    runAsGroup: 1001
    # -- Set Elasticsearch master-eligible container's Security Context runAsNonRoot
    runAsNonRoot: true
    # -- Set Elasticsearch master-eligible container's Security Context privileged
    privileged: false
    # -- Set Elasticsearch master-eligible container's Security Context allowPrivilegeEscalation
    allowPrivilegeEscalation: false
    # -- Set container's Security Context readOnlyRootFilesystem
    readOnlyRootFilesystem: true
    capabilities:
      # -- List of capabilities to be dropped
      drop: ["ALL"]
    seccompProfile:
      # -- Set container's Security Context seccomp profile
      type: "RuntimeDefault"
  ## Network Policies
  ## Ref: https://kubernetes.io/docs/concepts/services-networking/network-policies/
  ##
  networkPolicy:
    ##
    # -- Specifies whether a NetworkPolicy should be created
    enabled: true
    ## The Policy model to apply. When set to false, only pods with the correct
    ## server label will have network access to the ports server is listening
    ## on. When true, server will accept connections from any source
    ## (with the correct destination port).
    ##
    # -- Don't require server label for connections
    allowExternal: true
    ##
    # -- Allow the pod to access any range of port and all destinations.
    allowExternalEgress: true
    ## e.g:
    ## extraIngress:
    ##   - ports:
    ##       - port: 1234
    ##     from:
    ##       - podSelector:
    ##           - matchLabels:
    ##               - role: frontend
    ##       - podSelector:
    ##           - matchExpressions:
    ##               - key: role
    ##                 operator: In
    ##                 values:
    ##                   - frontend
    # -- Add extra ingress rules to the NetworkPolicy
    extraIngress: []
    ## e.g:
    ## extraEgress:
    ##   - ports:
    ##       - port: 1234
    ##     to:
    ##       - podSelector:
    ##           - matchLabels:
    ##               - role: frontend
    ##       - podSelector:
    ##           - matchExpressions:
    ##               - key: role
    ##                 operator: In
    ##                 values:
    ##                   - frontend
    ##
    # -- Add extra ingress rules to the NetworkPolicy
    extraEgress: []
    ##
    # -- Labels to match to allow traffic from other namespaces
    ingressNSMatchLabels: {}
    # -- Pod labels to match to allow traffic from other namespaces
    ingressNSPodMatchLabels: {}
  ##
  # -- Mount Service Account token in pod
  automountServiceAccountToken: false
  ## https://kubernetes.io/docs/concepts/services-networking/add-entries-to-pod-etc-hosts-with-host-aliases/
  ##
  # -- master-elegible pods host aliases
  hostAliases: []
  ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
  ##
  # -- Extra labels for master-elegible pods
  podLabels: {}
  ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  ##
  # -- Annotations for master-elegible pods
  podAnnotations: {}
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
  ##
  # -- Pod affinity preset. Ignored if `master.affinity` is set. Allowed values: `soft` or `hard`
  podAffinityPreset: ""
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
  ##
  # -- Pod anti-affinity preset. Ignored if `master.affinity` is set. Allowed values: `soft` or `hard`
  podAntiAffinityPreset: ""
  ## Node master.affinity preset
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#node-affinity
  ##
  nodeAffinityPreset:
    ##
    # -- Node affinity preset type. Ignored if `master.affinity` is set. Allowed values: `soft` or `hard`
    type: ""
    ##
    # -- Node label key to match. Ignored if `master.affinity` is set
    key: ""
    ## E.g.
    ## values:
    ##   - e2e-az1
    ##   - e2e-az2
    ##
    # -- Node label values to match. Ignored if `master.affinity` is set
    values: []
  ## ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  ## NOTE: `master.podAffinityPreset`, `master.podAntiAffinityPreset`, and `master.nodeAffinityPreset` will be ignored when it's set
  ##
  # -- Affinity for master-elegible pods assignment
  affinity: {}
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  ##
  # -- Node labels for master-elegible pods assignment
  nodeSelector: {}
  ## ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
  ##
  # -- Tolerations for master-elegible pods assignment
  tolerations: []
  ##
  # -- master-elegible pods' priorityClassName
  priorityClassName: ""
  ## ref: https://kubernetes.io/docs/tasks/administer-cluster/configure-multiple-schedulers/
  ##
  # -- Name of the k8s scheduler (other than default) for master-elegible pods
  schedulerName: ""
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod/#termination-of-pods
  ##
  # -- In seconds, time the given to the Elasticsearch Master pod needs to terminate gracefully
  terminationGracePeriodSeconds: ""
  ## Ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/#spread-constraints-for-pods
  ##
  # -- Topology Spread Constraints for pod assignment spread across your cluster among failure-domains. Evaluated as a template
  topologySpreadConstraints: []
  ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#pod-management-policies
  ##
  # -- podManagementPolicy to manage scaling operation of Elasticsearch master pods
  podManagementPolicy: "Parallel"
  ## Configure extra options for Elasticsearch master-elegible containers' liveness, readiness and startup probes
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
  ##
  startupProbe:
    # -- Enable/disable the startup probe (master nodes pod)
    enabled: false
    # -- Delay before startup probe is initiated (master nodes pod)
    initialDelaySeconds: 90
    # -- How often to perform the probe (master nodes pod)
    periodSeconds: 10
    # -- When the probe times out (master nodes pod)
    timeoutSeconds: 5
    # -- Minimum consecutive successes for the probe to be considered successful after having failed (master nodes pod)
    successThreshold: 1
