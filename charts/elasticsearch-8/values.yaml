    # -- Set Elasticsearch data container's Security Context runAsNonRoot
    runAsNonRoot: true
    # -- Set Elasticsearch data container's Security Context privileged
    privileged: false
    # -- Set Elasticsearch data container's Security Context allowPrivilegeEscalation
    allowPrivilegeEscalation: false
