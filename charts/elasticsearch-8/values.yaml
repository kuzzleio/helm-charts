  ## ref: https://kubernetes.io/docs/tasks/run-application/configure-pdb
  ##
  pdb:
    # -- Enable/disable a Pod Disruption Budget creation
    create: true
    # -- Minimum number/percentage of pods that should remain scheduled
    minAvailable: ""
    # -- Maximum number/percentage of pods that may be made unavailable
    maxUnavailable: ""
  ##
  # -- String to partially override elasticsearch.ingest.fullname
  nameOverride: ""
  ##
  # -- String to fully override elasticsearch.ingest.fullname
  fullnameOverride: ""
  ##
  # -- String to fully override ingest.master.servicename
  servicenameOverride: ""
  ##
  # -- Annotations for the ingest statefulset
  annotations: {}
  ##
  containerPorts:
    # -- Elasticsearch REST API port
    restAPI: 9200
    # -- Elasticsearch Transport port
    transport: 9300
  ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies
  ##
  updateStrategy:
    # -- Ingest-only nodes statefulset stategy type
    type: RollingUpdate
  ## Elasticsearch resource requests and limits
  ## ref: http://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/
  ## More information: https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
  ##
  # -- Set container resources according to one common preset (allowed values: none, nano, micro, small, medium, large, xlarge, 2xlarge). This is ignored if ingest.resources is set (ingest.resources is recommended for production).
  resourcesPreset: "small"
  ## Example:
  ## resources:
  ##   requests:
  ##     cpu: 2
  ##     memory: 512Mi
  ##   limits:
  ##     cpu: 3
  ##     memory: 1024Mi
  ##
  # -- Set container requests and limits for different resources like CPU or memory (essential for production workloads)
  resources: {}
  ## Note: The recommended heapSize is half of the container's memory.
  ## If omitted, it will be automatically set.
  ## Example:
  ##   heapSize: 128m
  ##
  # -- Elasticsearch ingest-only node heap size.
  heapSize: 128m
  ## Configure Pods Security Context
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
  ##
  podSecurityContext:
    # -- Enabled ingest-only pods' Security Context
    enabled: true
    # -- Set filesystem group change policy
    fsGroupChangePolicy: Always
    # -- Set kernel settings using the sysctl interface
    sysctls: []
    # -- Set filesystem extra groups
    supplementalGroups: []
    # -- Set ingest-only pod's Security Context fsGroup
    fsGroup: 1001
  ## Configure Container Security Context
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
  ##
  containerSecurityContext:
    # -- Elasticseacrh ingest container securityContext
    enabled: true
    # -- Set SELinux options in container
    seLinuxOptions: {}
    # -- User ID for the Elasticseacrh ingest container
    runAsUser: 1001
    # -- Group ID for the Elasticseacrh ingest container
    runAsGroup: 1001
    # -- Set Elasticsearch ingest container's Security Context runAsNonRoot
    runAsNonRoot: true
    # -- Set Elasticsearch ingest container's Security Context privileged
    privileged: false
    # -- Set Elasticsearch ingest container's Security Context allowPrivilegeEscalation
    allowPrivilegeEscalation: false
    # -- Set container's Security Context readOnlyRootFilesystem
    readOnlyRootFilesystem: true
    capabilities:
      # -- List of capabilities to be dropped
      drop: ["ALL"]
    seccompProfile:
      # -- Set container's Security Context seccomp profile
      type: "RuntimeDefault"
