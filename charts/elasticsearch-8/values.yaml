    # -- Additional annotations for the Ingress resource. To enable certificate autogeneration, place here your cert-manager annotations.
    annotations: {}
    ## TLS certificates will be retrieved from a TLS secret with name: `{{- printf "%s-tls" .Values.ingress.hostname }}`
    ## You can:
    ##   - Use the `ingress.secrets` parameter to create this TLS secret
    ##   - Rely on cert-manager to create it by setting the corresponding annotations
    ##   - Rely on Helm to create self-signed certificates by setting `ingress.selfSigned=true`
    ##
    # -- Enable TLS configuration for the host defined at `ingress.hostname` parameter
    tls: false
    ##
    # -- Create a TLS secret for this ingress record using self-signed certificates generated by Helm
    selfSigned: false
    ## This is supported in Kubernetes 1.18+ and required if you have more than one IngressClass marked as the default for your cluster .
    ## ref: https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/
    ##
    # -- IngressClass that will be be used to implement the Ingress (Kubernetes 1.18+)
    ingressClassName: ""
    ## e.g:
    ## extraHosts:
    ##   - name: elasticsearch.local
    ##     path: /
    ##
    # -- An array with additional hostname(s) to be covered with the ingress record
    extraHosts: []
    ## e.g:
    ## extraPaths:
    ## - path: /*
    ##   backend:
    ##     serviceName: ssl-redirect
    ##     servicePort: use-annotation
    ##
    # -- An array with additional arbitrary paths that may need to be added to the ingress under the main host
    extraPaths: []
    ## ref: https://kubernetes.io/docs/concepts/services-networking/ingress/#tls
    ## e.g:
    ## extraTls:
    ## - hosts:
    ##     - elasticsearch.local
    ##   secretName: elasticsearch.local-tls
    ##
    # -- TLS configuration for additional hostname(s) to be covered with this ingress record
    extraTls: []
    ## NOTE: 'key' and 'certificate' are expected in PEM format
    ## NOTE: 'name' should line up with a 'secretName' set further up
    ## If it is not set and you're using cert-manager, this is unneeded, as it will create a secret for you with valid certificates
    ## If it is not set and you're NOT using cert-manager either, self-signed certificates will be created valid for 365 days
    ## It is also possible to create and manage the certificates outside of this helm chart
    ## Please see README.md for more information
    ## e.g:
    ## secrets:
    ##   - name: elasticsearch.local-tls
    ##     key: |-
    ##       -----BEGIN RSA PRIVATE KEY-----
    ##       ...
    ##       -----END RSA PRIVATE KEY-----
    ##     certificate: |-
    ##       -----BEGIN CERTIFICATE-----
    ##       ...
    ##       -----END CERTIFICATE-----
    ##
    # -- Custom TLS certificates as secrets
    secrets: []
    ## ref: https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-rules
    ## e.g:
    ## extraRules:
    ## - host: example.local
    ##     http:
    ##       path: /
    ##       backend:
    ##         service:
    ##           name: example-svc
    ##           port:
    ##             name: http
    ##
    # -- Additional rules to be covered with this ingress record
    extraRules: []
## Metrics parameters

## Elasticsearch Prometheus exporter configuration
## ref: https://hub.docker.com/r/bitnami/elasticsearch-exporter/tags/
##
metrics:
  ##
  # -- Enable prometheus exporter
  enabled: false
  ##
  # -- Metrics pod name
  nameOverride: ""
  ##
  # -- String to fully override common.names.fullname
  fullnameOverride: ""
  ##
  image:
    # -- Metrics exporter image registry
    registry: docker.io
    # -- Metrics exporter image repository
    repository: bitnamilegacy/elasticsearch-exporter
    # @ignored
    tag: 1.9.0-debian-12-r6
    # -- Metrics exporter image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
    digest: ""
    # -- Metrics exporter image pull policy
    pullPolicy: IfNotPresent
    ## Optionally specify an array of imagePullSecrets.
    ## Secrets must be manually created in the namespace.
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
    ## e.g:
    ## pullSecrets:
    ##   - myRegistryKeySecretName
    ##
    # -- Metrics exporter image pull secrets
    pullSecrets: []
  ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  ##
  # -- Annotations for metrics
  annotations:
    helm.sh/hook: "post-install,post-upgrade"
    helm.sh/hook-weight: "5"
  ## ref: https://github.com/justwatchcom/elasticsearch_exporter
  ## e.g
  ## extraArgs:
  ##   - --es.snapshots
  ##   - --es.indices
  ##
  # -- Extra arguments to add to the default exporter command
  extraArgs: []
  ##
  # -- Mount Service Account token in pod
  automountServiceAccountToken: false
  ## https://kubernetes.io/docs/concepts/services-networking/add-entries-to-pod-etc-hosts-with-host-aliases/
  ##
  # -- Add deployment host aliases
  hostAliases: []
  ## ref: https://kubernetes.io/docs/tasks/administer-cluster/configure-multiple-schedulers/
  ##
  # -- Name of the k8s scheduler (other than default)
  schedulerName: ""
  ##
  # -- Elasticsearch metrics exporter pods' priorityClassName
  priorityClassName: ""
  ## Elasticsearch Prometheus exporter container ports
  ##
  containerPorts:
    # -- Metrics HTTP port
    http: 9114
  ## Network Policies
  ## Ref: https://kubernetes.io/docs/concepts/services-networking/network-policies/
  ##
  networkPolicy:
    ##
    # -- Specifies whether a NetworkPolicy should be created
    enabled: true
    ## The Policy model to apply. When set to false, only pods with the correct
    ## server label will have network access to the ports server is listening
    ## on. When true, server will accept connections from any source
    ## (with the correct destination port).
    ##
    # -- Don't require server label for connections
    allowExternal: true
    ##
    # -- Allow the pod to access any range of port and all destinations.
    allowExternalEgress: true
    ## e.g:
    ## extraIngress:
    ##   - ports:
    ##       - port: 1234
    ##     from:
    ##       - podSelector:
    ##           - matchLabels:
    ##               - role: frontend
    ##       - podSelector:
    ##           - matchExpressions:
    ##               - key: role
    ##                 operator: In
    ##                 values:
    ##                   - frontend
    # -- Add extra ingress rules to the NetworkPolicy
    extraIngress: []
    ## e.g:
    ## extraEgress:
    ##   - ports:
    ##       - port: 1234
    ##     to:
    ##       - podSelector:
    ##           - matchLabels:
    ##               - role: frontend
    ##       - podSelector:
    ##           - matchExpressions:
    ##               - key: role
    ##                 operator: In
    ##                 values:
    ##                   - frontend
    ##
    # -- Add extra ingress rules to the NetworkPolicy
    extraEgress: []
    ##
    # -- Labels to match to allow traffic from other namespaces
    ingressNSMatchLabels: {}
    # -- Pod labels to match to allow traffic from other namespaces
    ingressNSPodMatchLabels: {}
  ## Elasticsearch Prometheus exporter service type
  ##
  service:
    ##
    # -- Metrics exporter endpoint service type
    type: ClusterIP
    ##
    # -- Metrics exporter endpoint service port
    port: 9114
    ## This can be used to set the LoadBalancer service type to internal only.
    ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#internal-load-balancer
    ##
    # -- Provide any additional annotations which may be required.
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9114"
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
  ##
  # -- Metrics Pod affinity preset. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
  podAffinityPreset: ""
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
  ##
  # -- Metrics Pod anti-affinity preset. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
  podAntiAffinityPreset: ""
  ## Node affinity preset
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#node-affinity
  ##
  nodeAffinityPreset:
    # -- Metrics Node affinity preset type. Ignored if `affinity` is set. Allowed values: `soft` or `hard`
    type: ""
    ## E.g.
    ## key: "kubernetes.io/e2e-az-name"
    ##
    # -- Metrics Node label key to match Ignored if `affinity` is set.
    key: ""
    ## E.g.
    ## values:
    ##   - e2e-az1
    ##   - e2e-az2
    ##
    # -- Metrics Node label values to match. Ignored if `affinity` is set.
    values: []
  ## Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  ## Note: podAffinityPreset, podAntiAffinityPreset, and  nodeAffinityPreset will be ignored when it's set
  ##
  # -- Metrics Affinity for pod assignment
  affinity: {}
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  ##
  # -- Metrics Node labels for pod assignment
  nodeSelector: {}
  ## Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
  ##
  # -- Metrics Tolerations for pod assignment
  tolerations: []
  ## Ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/#spread-constraints-for-pods
  ##
  # -- Topology Spread Constraints for pod assignment spread across your cluster among failure-domains. Evaluated as a template
  topologySpreadConstraints: []
  ## Elasticsearch Prometheus exporter resource requests and limits
  ## ref: https://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/
  ## We usually recommend not to specify default resources and to leave this as a conscious
  ## choice for the user. This also increases chances charts run on environments with little
  ## resources, such as Minikube. If you do want to specify resources, uncomment the following
  ## lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  ## More information: https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
  ##
  # -- Set container resources according to one common preset (allowed values: none, nano, micro, small, medium, large, xlarge, 2xlarge). This is ignored if metrics.resources is set (metrics.resources is recommended for production).
  resourcesPreset: "nano"
  ## Example:
  ## resources:
  ##   requests:
  ##     cpu: 2
  ##     memory: 512Mi
  ##   limits:
  ##     cpu: 3
  ##     memory: 1024Mi
  ##
  # -- Set container requests and limits for different resources like CPU or memory (essential for production workloads)
  resources: {}
  ## Elasticsearch metrics container's liveness probe
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#container-probes
  ##
  livenessProbe:
    # -- Enable/disable the liveness probe (metrics pod)
    enabled: true
    # -- Delay before liveness probe is initiated (metrics pod)
    initialDelaySeconds: 60
    # -- How often to perform the probe (metrics pod)
    periodSeconds: 10
    # -- When the probe times out (metrics pod)
    timeoutSeconds: 5
    # -- Minimum consecutive successes for the probe to be considered successful after having failed (metrics pod)
    successThreshold: 1
    # -- Minimum consecutive failures for the probe to be considered failed after having succeeded
    failureThreshold: 5
  ## Elasticsearch metrics container's readiness probe
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#container-probes
  ##
  readinessProbe:
    # -- Enable/disable the readiness probe (metrics pod)
    enabled: true
    # -- Delay before readiness probe is initiated (metrics pod)
    initialDelaySeconds: 5
    # -- How often to perform the probe (metrics pod)
    periodSeconds: 10
    # -- When the probe times out (metrics pod)
    timeoutSeconds: 1
    # -- Minimum consecutive successes for the probe to be considered successful after having failed (metrics pod)
    successThreshold: 1
    # -- Minimum consecutive failures for the probe to be considered failed after having succeeded
    failureThreshold: 5
  ## Elasticsearch metrics container's startup probe
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#container-probes
  ##
  startupProbe:
    # -- Enable/disable the startup probe (metrics pod)
    enabled: false
    # -- Delay before startup probe is initiated (metrics pod)
    initialDelaySeconds: 5
    # -- How often to perform the probe (metrics pod)
    periodSeconds: 10
    # -- When the probe times out (metrics pod)
    timeoutSeconds: 1
    # -- Minimum consecutive successes for the probe to be considered successful after having failed (metrics pod)
    successThreshold: 1
    # -- Minimum consecutive failures for the probe to be considered failed after having succeeded
    failureThreshold: 5
  ##
  # -- Custom liveness probe for the Web component
  customStartupProbe: {}
  ##
  # -- Custom liveness probe for the Web component
  customLivenessProbe: {}
  ##
  # -- Custom readiness probe for the Web component
  customReadinessProbe: {}
  ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  ##
  # -- Metrics exporter pod Annotation and Labels
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9114"
  ##
  # -- Extra labels to add to Pod
  podLabels: {}
  ## Configure Pods Security Context
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
  ##
  podSecurityContext:
    # -- Enabled Elasticsearch metrics exporter pods' Security Context
    enabled: true
    # -- Set filesystem group change policy
    fsGroupChangePolicy: Always
    # -- Set kernel settings using the sysctl interface
    sysctls: []
    # -- Set filesystem extra groups
    supplementalGroups: []
    # -- Set Elasticsearch metrics exporter pod's Security Context fsGroup
    fsGroup: 1001
  ## Configure Container Security Context
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
  ##
  containerSecurityContext:
    # -- Elasticseacrh exporter container securityContext
    enabled: true
    # -- Set SELinux options in container
    seLinuxOptions: {}
    # -- User ID for the Elasticseacrh exporter container
    runAsUser: 1001
    # -- Group ID for the Elasticseacrh exporter container
    runAsGroup: 1001
    # -- Set Elasticsearch exporter container's Security Context runAsNonRoot
    runAsNonRoot: true
    # -- Set Elasticsearch exporter container's Security Context privileged
    privileged: false
    # -- Set Elasticsearch exporter container's Security Context allowPrivilegeEscalation
    allowPrivilegeEscalation: false
    # -- Set container's Security Context readOnlyRootFilesystem
    readOnlyRootFilesystem: true
    capabilities:
      # -- List of capabilities to be dropped
      drop: ["ALL"]
    seccompProfile:
      # -- Set container's Security Context seccomp profile
      type: "RuntimeDefault"
  ##
  # -- Override default container command (useful when using custom images)
  command: []
  ##
  # -- Override default container args (useful when using custom images)
  args: []
  ## e.g:
  ## extraEnvVars:
  ##   - name: FOO
  ##     value: "bar"
  ##
  # -- Array with extra environment variables to add to Elasticsearch metrics exporter nodes
  extraEnvVars: []
  ##
  # -- Name of existing ConfigMap containing extra env vars for Elasticsearch metrics exporter nodes
  extraEnvVarsCM: ""
  ##
  # -- Name of existing Secret containing extra env vars for Elasticsearch metrics exporter nodes
  extraEnvVarsSecret: ""
  ##
  # -- Optionally specify extra list of additional volumes for the Elasticsearch metrics exporter pod(s)
  extraVolumes: []
  ##
  # -- Optionally specify extra list of additional volumeMounts for the Elasticsearch metrics exporter container(s)
  extraVolumeMounts: []
  ## e.g:
  ## sidecars:
  ##   - name: your-image-name
  ##     image: your-image
  ##     imagePullPolicy: Always
  ##     ports:
  ##       - name: portname
  ##         containerPort: 1234
  ##
  # -- Add additional sidecar containers to the Elasticsearch metrics exporter pod(s)
  sidecars: []
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
  ## e.g:
  ## initContainers:
  ##  - name: your-image-name
  ##    image: your-image
  ##    imagePullPolicy: Always
  ##    command: ['sh', '-c', 'echo "hello world"']
  ##
  # -- Add additional init containers to the Elasticsearch metrics exporter pod(s)
  initContainers: []
  ## Pods Service Account
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  ##
  serviceAccount:
    # -- Specifies whether a ServiceAccount should be created
    create: true
    # -- Name of the service account to use. If not set and create is true, a name is generated using the fullname template.
    name: ""
    # -- Automount service account token for the server service account
    automountServiceAccountToken: false
    # -- Annotations for service account. Evaluated as a template. Only used if `create` is `true`.
    annotations: {}
  ## Prometheus Operator ServiceMonitor configuration
  ##
  serviceMonitor:
    ##
    # -- Create ServiceMonitor Resource for scraping metrics using PrometheusOperator
    enabled: false
    ## e.g:
    ## namespace: monitoring
    ##
    # -- Namespace which Prometheus is running in
    namespace: ""
    ##
    # -- The name of the label on the target service to use as the job name in prometheus.
    jobLabel: ""
    ## ref: https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md#endpoint
    ##
    # -- Interval at which metrics should be scraped
    interval: ""
    ## ref: https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md#endpoint
    ##
    # -- Timeout after which the scrape is ended
    scrapeTimeout: ""
    ## ref: https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md#relabelconfig
    ##
    # -- RelabelConfigs to apply to samples before scraping
    relabelings: []
    ## ref: https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md#relabelconfig
    ##
    # -- MetricRelabelConfigs to apply to samples before ingestion
    metricRelabelings: []
    ## ref: https://github.com/bitnami/charts/tree/main/bitnami/prometheus-operator#prometheus-configuration
    ##
    ## selector:
    ##   prometheus: my-prometheus
    ##
    # -- ServiceMonitor selector labels
    selector: {}
    ##
    # -- Extra labels for the ServiceMonitor
    labels: {}
    ##
    # -- honorLabels chooses the metric's labels on collisions with target labels
    honorLabels: false
  ## Prometheus Operator PrometheusRule configuration
  ##
  prometheusRule:
    ##
    # -- Creates a Prometheus Operator PrometheusRule (also requires `metrics.enabled` to be `true` and `metrics.prometheusRule.rules`)
    enabled: false
    ##
    # -- Namespace for the PrometheusRule Resource (defaults to the Release Namespace)
    namespace: ""
    ##
    # -- Additional labels that can be used so PrometheusRule will be discovered by Prometheus
    additionalLabels: {}
    # - alert: es cluster error
    #   annotations:
    #     summary: "es cluster error"
    #     description: "es cluster error, cluster state {{`{{`}} $labels.color {{`}}`}}"
    #   expr: elasticsearch_cluster_health_status{color="red"} ==1 or elasticsearch_cluster_health_status{color="yellow"} ==1
    #   for: 1m
    #   labels:
    #     severity: critical
    #     group: PaaS
    ##
    # -- Prometheus Rule definitions
    rules: []
